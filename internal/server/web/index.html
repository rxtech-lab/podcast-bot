<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>debate-bot — live</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="status-bar">
        <span id="phase">phase: setup</span>
        <span id="timer">00:00 / 00:00</span>
        <span id="status"></span>
      </header>

      <main>
        <section id="stage">
          <video id="player" controls autoplay playsinline></video>
          <div id="player-fallback" hidden>
            video unavailable — server didn't start the encoder. audio is still
            playing through the chat below.
          </div>
          <audio id="audio-fallback" src="/api/audio/stream" hidden></audio>
        </section>

        <aside id="chat">
          <h2>chat</h2>
          <ol id="chat-log"></ol>
          <form id="chat-form">
            <input
              id="chat-input"
              type="text"
              maxlength="500"
              autocomplete="off"
              placeholder="say something to the panel… (/end to wrap up)"
            />
            <button type="submit">send</button>
          </form>
        </aside>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
