# The `debate-bot-secrets` Secret referenced below is NOT defined here.
# Create it from secrets.example.yaml (copy -> secrets.yaml -> fill -> apply).
#
# A StatefulSet (not a Deployment) gives every pod a stable identity
# (debate-bot-0, debate-bot-1, ...) and a stable DNS name via the headless
# service below. That stable name is what the in-app cross-pod proxy dials:
# a request for an in-flight job that landed on the wrong pod is reverse-
# proxied to the pod that owns the job's live audio stream (PEER_HOST_TEMPLATE).
#
# Shared state lives off-pod so any replica can serve any finished job:
#   - job + discussion metadata -> Postgres or Turso/libSQL (DATABASE_URL)
#   - finished mp3/mp4/vtt        -> S3 / R2 (S3_* in the Secret)
# Each pod keeps only its own scratch render output on a per-pod PVC
# (volumeClaimTemplates), so we can run RollingUpdate with N replicas.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: debate-bot
  namespace: debate-bot
  labels:
    app: debate-bot
spec:
  serviceName: debate-bot-headless   # must match the headless Service name
  replicas: 2
  podManagementPolicy: Parallel      # boot pods concurrently, not one-by-one
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: debate-bot
  template:
    metadata:
      labels:
        app: debate-bot
    spec:
      # Give in-flight HTTP/SSE/audio streams time to drain (or be re-issued by
      # clients) before a pod is killed during a rollout.
      terminationGracePeriodSeconds: 60
      containers:
        - name: debate-bot
          image: ghcr.io/rxtech-lab/podcast-bot:sha-590cd5b
          imagePullPolicy: Always
          args: ["server", "--mode", "video", "--addr", ":3000"]
          ports:
            - name: http
              containerPort: 3000
          env:
            # Provider endpoint/model config comes from debate-bot-secrets so
            # Vercel AI Gateway keys are not accidentally sent to api.openai.com.
            - name: OUT_DIR
              value: "/app/out"
            - name: REDIS_URL
              value: "redis://redis.redis.svc.cluster.local:6379"
            # POD_NAME is this pod's stable identity (debate-bot-N), injected via
            # the downward API. The server stamps it onto jobs it runs and uses
            # it to know which requests are "mine" vs "proxy to the owner".
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # PEER_HOST_TEMPLATE builds the address of a peer pod from its name.
            # The %s is replaced with the owner pod (e.g. debate-bot-0); the
            # suffix is <headless-service>.<namespace>.svc.cluster.local:<port>.
            - name: PEER_HOST_TEMPLATE
              value: "%s.debate-bot-headless.debate-bot.svc.cluster.local:3000"
          envFrom:
            - secretRef:
                name: debate-bot-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              # ffmpeg + concurrent TTS/render are CPU/RAM hungry; give it room.
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: out
              mountPath: /app/out
  # Per-pod scratch volume for in-progress render output (HLS segments, the
  # working mp3/mp4 before S3 upload). Each replica gets its own PVC, so pods
  # never share a volume and RollingUpdate is safe.
  volumeClaimTemplates:
    - metadata:
        name: out
        labels:
          app: debate-bot
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        # Uses the cluster default StorageClass (microk8s hostpath-storage).
        # Set storageClassName explicitly here if your cluster's default differs.
