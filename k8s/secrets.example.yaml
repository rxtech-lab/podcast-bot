# Secrets for the debate-bot deployment.
#
#   cp k8s/secrets.example.yaml k8s/secrets.yaml
#   # edit k8s/secrets.yaml — fill in real values
#   kubectl apply -f k8s/secrets.yaml
#
# Do NOT commit the filled-in secrets.yaml (gitignore it).
#
# Note: TLS is handled by the cluster-wide cert-manager `letsencrypt-prod`
# ClusterIssuer (HTTP-01) — no Cloudflare token or extra secret needed here.
# ---------------------------------------------------------------------------
# App provider config, keys, and UI password (consumed via envFrom in the
# StatefulSet). Keep endpoint/model values here so gateway keys are paired with
# their matching OpenAI-compatible base URL.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: debate-bot-secrets
  namespace: debate-bot
type: Opaque
stringData:
  # Chat endpoint (OpenAI-compatible). Use the matching base URL for the key:
  # for example, Vercel AI Gateway keys (`vck_...`) need
  # https://ai-gateway.vercel.sh/v1, not https://api.openai.com/v1.
  OPENAI_BASE_URL: "https://api.openai.com/v1"
  OPENAI_API_KEY: "sk-replace-me"
  HOST_MODEL: "gpt-4o"
  COMPRESSION_MODEL: "gpt-4o-mini"
  # Gemini drives Lyria music + scene image generation (required).
  GEMINI_API_KEY: "replace-me"
  # Optional: Gemini model that transcribes voice messages server-side when a
  # sender's device can't do on-device speech-to-text. Defaults to
  # "gemini-2.5-flash" when unset.
  # GEMINI_TRANSCRIBE_MODEL: "gemini-3.1-flash-lite"
  # Gate the whole web UI + API behind this password (recommended for a public
  # domain). Leave blank to run open.
  APP_PASSWORD: "choose-a-strong-password"

  # Optional TTS providers — only needed when a script selects them.
  # AZURE_SPEECH_KEY: ""
  # AZURE_SPEECH_REGION: ""
  # ELEVENLABS_API_KEY: ""

  # Optional: separate endpoint/key for the memory-compression model (default:
  # reuse OPENAI_BASE_URL / OPENAI_API_KEY).
  # COMPRESSION_BASE_URL: ""
  # COMPRESSION_API_KEY: ""

  # ---------------------------------------------------------------------------
  # Shared metadata DB — REQUIRED for multi-replica (horizontal) scaling.
  # ---------------------------------------------------------------------------
  # With >1 replica every pod must see the same job + discussion metadata, so
  # point all pods at one shared Postgres or Turso database. Leave DATABASE_URL
  # blank to fall back to per-pod local SQLite (only correct with replicas: 1).
  #   Postgres example: postgresql://user:pass@postgres.example.com:5432/debate
  #   Turso example:    libsql://debate-bot-<org>.turso.io
  DATABASE_URL: "postgresql://replace-me"
  # Compatibility fallback when DATABASE_URL is blank:
  # TURSO_CONNECTION_URL: "libsql://replace-me.turso.io"
  TURSO_AUTH_TOKEN: "replace-me"

  # ---------------------------------------------------------------------------
  # S3 / R2 object storage — REQUIRED for multi-replica scaling.
  # ---------------------------------------------------------------------------
  # Finished mp3/mp4 must live in shared object storage so any pod can serve a
  # download (the pod that rendered it may be gone). Without this, finished
  # artefacts are only on the rendering pod's local disk.
  S3_BUCKET: "debate-bot"
  S3_REGION: "auto"
  S3_ENDPOINT: "https://<account>.r2.cloudflarestorage.com"
  S3_ACCESS_KEY_ID: "replace-me"
  S3_SECRET_ACCESS_KEY: "replace-me"
  # Optional: serve downloads from a public CDN domain instead of presigned URLs.
  # S3_DOWNLOAD_BASE_URL: "https://cdn.example.com"
  # S3_PREFIX: ""

  # ---------------------------------------------------------------------------
  # RabbitMQ — durable generation-job queue (podcast renders, summaries,
  # mindmaps, PPT/PDF exports, audiobook videos, planning turns) with retry
  # (max 3 attempts). Blank falls back to an in-process queue with the same
  # retry semantics but no durability across pod restarts.
  # ---------------------------------------------------------------------------
  # Shares the broker the linda-assistant deployment runs in the `linda`
  # namespace (same cluster; the ClusterIP is reachable cross-namespace).
  # Queue names don't collide — linda uses agent-tasks / audio-generation-*,
  # this app uses podcast.*. The heavy queue's 3h consumer timeout travels as
  # a per-queue argument, so no linda-side broker config is required.
  RABBITMQ_URL: "amqp://linda:linda@rabbitmq.linda.svc.cluster.local:5672"

  # ---------------------------------------------------------------------------
  # Notion OAuth — optional, enables attaching Notion pages as plan sources.
  # ---------------------------------------------------------------------------
  # Register NOTION_OAUTH_REDIRECT_URI in the Notion integration settings.
  NOTION_OAUTH_CLIENT_ID: "replace-me"
  NOTION_OAUTH_CLIENT_SECRET: "replace-me"
  NOTION_OAUTH_REDIRECT_URI: "https://debatebot.rxlab.app/api/notion/oauth/callback"
  NOTION_APP_CALLBACK_URL: "debatepod://notion-callback"

  # Note: POD_NAME and PEER_HOST_TEMPLATE are set as plain env in the
  # StatefulSet (not secret) — no entry needed here.
