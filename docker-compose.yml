services:
  rabbitmq:
    # Same image family as the cluster broker (linda namespace) so local
    # behavior — RabbitMQ 4 quorum queues, per-queue x-consumer-timeout —
    # matches production.
    image: rabbitmq:4-management-alpine
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # management UI (guest/guest)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s

  # Postgres with pgvector, matching the production database used for the
  # semantic search / Q&A embedding store. Point the server at it with
  # DATABASE_URL=postgres://debate:debate@127.0.0.1:5432/debate
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: debate
      POSTGRES_PASSWORD: debate
      POSTGRES_DB: debate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debate -d debate"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  rabbitmq_data:
  postgres_data:
