name: iOS CI

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS App
    runs-on: [self-hosted, macOS, ARM64, regular]
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Secrets.xcconfig from GitHub Secrets
        env:
          SECRETS_XCCONFIG_BASE64: ${{ secrets.SECRETS_XCCONFIG_BASE64 }}
        run: |
          if [ -z "$SECRETS_XCCONFIG_BASE64" ]; then
            echo "⚠️ SECRETS_XCCONFIG_BASE64 not set; skipping Secrets.xcconfig setup"
          else
            echo "✅ Decoding Secrets.xcconfig from GitHub secrets"
            echo "$SECRETS_XCCONFIG_BASE64" | base64 --decode > iOS/Config/Secrets.xcconfig
            echo "Contents of Secrets.xcconfig (with secrets masked):"
            sed -E 's/(REVENUECAT_API_KEY.*=).*/\1 ***/' iOS/Config/Secrets.xcconfig
          fi

      - name: Build iOS app
        run: ./scripts/ios-build.sh
        env:
          SCHEME: iOS
          CONFIGURATION: Debug
          SDK: iphonesimulator

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-build-log
          path: build.log
          retention-days: 7
          if-no-files-found: ignore

  test-ios:
    name: Run iOS UI Tests
    runs-on: [self-hosted, macOS, ARM64, ui-tests]
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # The E2E backend encodes audio with ffmpeg (LiveStream pacer + ConcatToMP3).
      - name: Install ffmpeg
        run: |
          if command -v ffmpeg >/dev/null 2>&1; then
            echo "ffmpeg already present: $(command -v ffmpeg)"
          else
            echo "Installing ffmpeg via Homebrew..."
            brew install ffmpeg
          fi
          ffmpeg -version | head -n 1

      # The E2E backend consumes generation jobs from a real RabbitMQ broker.
      # brew services is idempotent on the persistent self-hosted runner;
      # scripts/e2e.sh re-checks and isolates each run behind a unique
      # queue-name prefix (prefixed queues auto-expire when idle).
      - name: Start RabbitMQ
        run: |
          if ! command -v rabbitmq-server >/dev/null 2>&1; then
            echo "Installing rabbitmq via Homebrew..."
            brew install rabbitmq
          fi
          brew services start rabbitmq
          for i in $(seq 1 60); do
            nc -z 127.0.0.1 5672 2>/dev/null && break
            sleep 1
          done
          nc -z 127.0.0.1 5672 || { echo "rabbitmq did not become ready" >&2; exit 1; }
          echo "rabbitmq ready on 127.0.0.1:5672"

      - name: Prepare Simulators
        run: |
          echo "Shutting down all simulators..."
          xcrun simctl shutdown all 2>/dev/null || true
          echo "Erasing all simulators..."
          xcrun simctl erase all 2>/dev/null || true
          echo "Simulators ready"

      # Builds the Go backend in hermetic E2E mode (fake LLM/TTS, local SQLite,
      # auth bypassed, seeded fixtures), waits for health, then runs the
      # iosUITestPlan against it on the simulator and tears the server down.
      - name: Run iOS UI test plan (E2E)
        run: ./scripts/e2e.sh
        env:
          E2E_TEST_PLAN: iosUITestPlan
          E2E_SIMULATOR: iPhone 17 Pro

      - name: Upload backend server log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-e2e-server-log
          path: /tmp/debate-bot-e2e.server.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-e2e-xcodebuild-log
          path: /tmp/debate-bot-e2e.xcodebuild.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-e2e-xcresult
          path: /tmp/debate-bot-e2e.xcresult
          retention-days: 7
          if-no-files-found: ignore
