name: Docker Image & K8s Deploy

on:
  push:
  pull_request:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Push the image and deploy it to Kubernetes"
        required: true
        type: boolean
        default: false
      image_tag:
        description: "Image tag for workflow_dispatch deploys (defaults to manual-<sha>)"
        required: false
  workflow_call:
    inputs:
      deploy:
        description: "Push the image and deploy it to Kubernetes"
        required: false
        type: boolean
        default: false
      image_tag:
        description: "Image tag for workflow_call deploys (defaults to manual-<sha>)"
        required: false
        type: string

# The k8s cluster runs on linux/amd64, so we always build for that platform
# (see the Makefile docker-* targets). Release deploys go to GitHub Container Registry.
env:
  IMAGE: ghcr.io/rxtech-lab/podcast-bot
  PLATFORM: linux/amd64
  K8S_NAMESPACE: debate-bot
  K8S_WORKLOAD: statefulset/debate-bot
  K8S_CONTAINER: debate-bot

jobs:
  build-image:
    name: Build image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image_tag.outputs.tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: image_tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "release" ]]; then
            tag="$REF_NAME"
          elif [[ ("$EVENT_NAME" == "workflow_dispatch" || "$EVENT_NAME" == "workflow_call") && -n "$INPUT_IMAGE_TAG" ]]; then
            tag="$INPUT_IMAGE_TAG"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" || "$EVENT_NAME" == "workflow_call" ]]; then
            tag="manual-${GITHUB_SHA::7}"
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            tag="pr-$PR_NUMBER"
          else
            tag="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'release' || inputs.deploy == true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.image_tag.outputs.tag }}
            type=sha
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORM }}
          push: ${{ github.event_name == 'release' || inputs.deploy == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  k8s-deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'release' || inputs.deploy == true
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: latest

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K8S_CONFIG_FILE_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Apply Kubernetes manifests
        run: kubectl kustomize k8s/ | kubectl apply -f -

      - name: Update StatefulSet image
        run: |
          kubectl set image "${K8S_WORKLOAD}" \
            "${K8S_CONTAINER}=${IMAGE}:${{ needs.build-image.outputs.image-tag }}" \
            -n "${K8S_NAMESPACE}"

      - name: Wait for rollout
        run: kubectl rollout status "${K8S_WORKLOAD}" -n "${K8S_NAMESPACE}" --timeout=300s

      - name: Verify deployment
        run: kubectl get pods,services,ingress -n "${K8S_NAMESPACE}"
