name: Create Release
on:
  workflow_dispatch:
    inputs:
      release_target:
        description: "What to release"
        required: true
        type: choice
        default: release-all
        options:
          - release-all
          - release-server-only

jobs:
  create-release:
    if: inputs.release_target == 'release-all'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Create Release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          branch: main

  release-server-only:
    if: inputs.release_target == 'release-server-only'
    uses: ./.github/workflows/docker-build.yaml
    permissions:
      contents: read
      packages: write
    with:
      deploy: true
    secrets: inherit
