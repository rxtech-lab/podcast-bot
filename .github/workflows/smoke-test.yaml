name: Smoke Test
on:
  push:

jobs:
  style-smoke:
    name: Style golden smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache style font
        uses: actions/cache@v4
        with:
          path: internal/video/testdata/fonts/NotoSansSC-Regular.otf
          key: style-font-${{ hashFiles('scripts/fetch-style-font.sh') }}
      - name: Run style smoke test
        run: make style-test
      - name: Upload rendered frames on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: style-actual-frames
          path: smoke-test/_actual/
          if-no-files-found: ignore
