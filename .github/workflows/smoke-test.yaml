name: Smoke Test
on:
  push:

jobs:
  go-tests:
    name: Go tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: debate_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d debate_bot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        # Real broker for the internal/mq integration tests (they self-skip
        # without RABBITMQ_TEST_URL).
        image: rabbitmq:4-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache style font
        uses: actions/cache@v4
        with:
          path: internal/video/testdata/fonts/NotoSansSC-Regular.otf
          key: style-font-${{ hashFiles('scripts/fetch-style-font.sh') }}
      - name: Fetch style font
        run: make style-font
      - name: Install ffmpeg
        # The audio/caption sync regression tests (internal/content_creator,
        # internal/video, internal/tts) exercise real ffmpeg/ffprobe and
        # self-skip without them — install so every push actually runs them.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Run Go tests
        env:
          POSTGRES_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/debate_bot_test?sslmode=disable
          RABBITMQ_TEST_URL: amqp://guest:guest@localhost:5672/
        run: go test ./...

  style-smoke:
    name: Style golden smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache style font
        uses: actions/cache@v4
        with:
          path: internal/video/testdata/fonts/NotoSansSC-Regular.otf
          key: style-font-${{ hashFiles('scripts/fetch-style-font.sh') }}
      - name: Run style smoke test
        run: make style-test
      - name: Run transcription test
        # Secrets supply the Gemini key + model; without GEMINI_API_KEY the test
        # self-skips (so forks / secret-less runs stay green).
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: go test ./internal/server/ -run TestTranscribeSample -v
      - name: Upload rendered frames on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: style-actual-frames
          path: smoke-test/_actual/
          if-no-files-found: ignore
