<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <!-- Dark navy plate, matches the renderer's bg color (#0c1426). -->
  <rect width="64" height="64" rx="10" fill="#0c1426"/>
  <!-- CNN-red title banner mini-replica with the same thin inner stroke
       the renderer paints around the live debate banner. -->
  <rect x="6" y="20" width="52" height="24" fill="#c8101c"/>
  <rect x="10" y="24" width="44" height="16" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
  <!-- Two opposing dots above and below the banner reading as "two debate
       sides" (blue affirmative / red negative). Sized to stay visible at 16px. -->
  <circle cx="14" cy="12" r="3" fill="#1a73e8"/>
  <circle cx="50" cy="52" r="3" fill="#c8101c"/>
</svg>
